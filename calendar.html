<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasting Calendar - Eggstra Madness</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@400;600&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-transition inner-page">

    <!-- Minimal Navbar -->
    <nav class="top-nav glass-panel">
        <div class="nav-logo">
            <a href="index.html">Eggstra Madness</a>
        </div>
        <div class="nav-links">
            <a href="explore.html" class="nav-link">Explore</a>
        </div>
    </nav>
    
    <main class="calendar-container">
        <header class="calendar-header fade-in">
            <h1 class="page-title glow-text">Fasting & Reflection Calendar</h1>
            <p class="subtitle">A 50-day journey of spiritual renewal.</p>
        </header>

        <section class="calendar-stats glass-panel fade-in">
            <div class="stat-box">
                <h3>Streak</h3>
                <div class="streak-counter glow-text"><span id="streakValue">0</span> Days</div>
            </div>
            
            <div class="progress-ring-container">
                <svg class="progress-ring" width="120" height="120">
                    <circle class="progress-ring-circle-bg" stroke="#E6E1FA" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
                    <circle id="progressCircle" class="progress-ring-circle" stroke="#A3E4D7" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
                </svg>
                <div class="progress-text"><span id="progressPercent">0</span>%</div>
            </div>
            
            <div class="stat-box daily-proverb">
                <h3>Today's Proverb</h3>
                <p id="proverbText">Select a day to reveal wisdom.</p>
            </div>
        </section>

        <section class="calendar-grid-wrapper zoom-in">
            <div id="calendarGrid" class="calendar-grid">
                <!-- Grid items generated by JS -->
            </div>
        </section>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
